<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#0081a7" opacity="0.1"/>
  
  <!-- House Roof -->
  <polygon points="100,40 50,95 150,95" fill="#f07167" stroke="none"/>
  
  <!-- House Roof Highlight -->
  <polygon points="100,40 75,68 125,68" fill="#fed9b7" opacity="0.6"/>
  
  <!-- House Wall -->
  <rect x="50" y="95" width="100" height="70" fill="#00afb9" stroke="none" rx="3"/>
  
  <!-- Left Window -->
  <rect x="60" y="110" width="25" height="25" fill="#fdfcdc" stroke="#0081a7" stroke-width="2" rx="2"/>
  <line x1="72.5" y1="110" x2="72.5" y2="135" stroke="#0081a7" stroke-width="1"/>
  <line x1="60" y1="122.5" x2="85" y2="122.5" stroke="#0081a7" stroke-width="1"/>
  
  <!-- Right Window -->
  <rect x="115" y="110" width="25" height="25" fill="#fdfcdc" stroke="#0081a7" stroke-width="2" rx="2"/>
  <line x1="127.5" y1="110" x2="127.5" y2="135" stroke="#0081a7" stroke-width="1"/>
  <line x1="115" y1="122.5" x2="140" y2="122.5" stroke="#0081a7" stroke-width="1"/>
  
  <!-- Door -->
  <rect x="85" y="145" width="30" height="40" fill="#0081a7" stroke="#0081a7" stroke-width="2" rx="2"/>
  <circle cx="112" cy="165" r="3" fill="#fed9b7"/>
  
  <!-- Door Handle Detail -->
  <circle cx="112" cy="165" r="2.5" fill="none" stroke="#fed9b7" stroke-width="0.5"/>
  
  <!-- Decorative element - chimney -->
  <rect x="130" y="60" width="12" height="35" fill="#f07167" stroke="none" rx="1"/>
  <rect x="128" y="55" width="16" height="6" fill="#fed9b7" stroke="none" rx="1"/>
  
  <!-- Text: Livora -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0081a7">LIVORA</text>
</svg>